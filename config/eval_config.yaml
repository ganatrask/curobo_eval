# ---------------------------------------------------------------------------
# Output / Logging
# ---------------------------------------------------------------------------
output:
  results_dir: "results"
  # Save full trajectory data (large files) or just metrics
  save_trajectories: false
  # Save per-problem details or just aggregate stats
  save_per_problem: true
